<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ negocio.nombre }} — Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--card:#16162a;--border:#1e1e2e;--accent:#6c5ce7;--accent2:#00cec9;--green:#00b894;--red:#e94560;--amber:#f59e0b;--text:#e2e2e8;--muted:#6b6b80;--radius:12px}
[data-theme="light"]{--bg:#f5f5f7;--surface:#ffffff;--card:#ffffff;--border:#e0e0e5;--accent:#6c5ce7;--accent2:#00897b;--green:#00a67e;--red:#dc3545;--amber:#e6a200;--text:#1a1a2e;--muted:#6b6b80;--radius:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:12px;transition:background .3s}
.header-left{display:flex;align-items:center;gap:12px}
.biz-name{font-size:20px;color:var(--text);font-weight:700}
.nav-link{color:var(--muted);text-decoration:none;font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);transition:all .2s;margin-left:8px}
.nav-link:hover,.nav-link.active{color:var(--accent);border-color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.reloj{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted)}
.date-nav{display:flex;align-items:center;gap:8px}
.date-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .3s}
.date-nav button:hover{border-color:var(--accent)}
.btn-hoy{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.ctrl-btn{background:var(--card);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Space Mono',monospace;transition:background .3s}
.ctrl-btn:hover{border-color:var(--accent2);color:var(--accent2)}
#fecha-display{font-size:14px;font-weight:600;min-width:160px;text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:20px 24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;transition:background .3s}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace}
.stat-value{font-size:28px;font-weight:700}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.amber{color:var(--amber)}.stat-value.accent{color:var(--accent)}
.section{padding:0 24px 24px}
.section-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%}
.citas-grid{display:grid;gap:10px}
.cita{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:grid;grid-template-columns:80px 1fr auto;gap:16px;align-items:center;transition:border-color .2s,background .3s}
.cita:hover{border-color:var(--accent)}
.cita-hora{text-align:center}
.cita-hora .inicio{font-size:16px;font-weight:700;color:var(--accent2)}
.cita-hora .fin{font-size:11px;color:var(--muted)}
.cita-hora .duracion{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px}
.cita-info h4{font-size:15px;font-weight:600;margin-bottom:2px}
.cita-info .servicio{font-size:13px;color:var(--accent);font-weight:500}
.cita-info .precio{font-size:12px;color:var(--green);font-weight:600}
.cita-info .tel{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}
.cita-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.btn-sm{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:transform .1s}
.btn-sm:hover{transform:scale(1.05)}
.btn-completar{background:var(--green);color:#fff}
.btn-noshow{background:var(--amber);color:#000}
.btn-cancelar{background:rgba(233,69,96,.15);color:var(--red);border:1px solid rgba(233,69,96,.3)}
.estado-badge{font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.estado-confirmada{background:rgba(0,184,148,.15);color:var(--green)}
.estado-completada{background:rgba(108,92,231,.15);color:var(--accent)}
.estado-cancelada{background:rgba(233,69,96,.15);color:var(--red)}
.estado-no_show{background:rgba(245,158,11,.15);color:var(--amber)}
.vacio{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px}
.footer{text-align:center;padding:32px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:640px){
  .cita{grid-template-columns:1fr;gap:8px}
  .cita-hora{text-align:left;display:flex;gap:8px;align-items:baseline}
  .cita-actions{justify-content:flex-start}
  .stats{grid-template-columns:1fr 1fr}
  .header{padding:12px 16px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="biz-name">{{ negocio.nombre }}</span>
    <a href="/dashboard/{{ negocio.slug }}" class="nav-link active" id="nav-citas"></a>
    <a href="/dashboard/{{ negocio.slug }}/config" class="nav-link" id="nav-config">Config</a>
  </div>
  <div class="header-right">
    <button class="ctrl-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
    <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn"></button>
    <div class="date-nav">
      <button onclick="cambiarFecha(-1)">‹</button>
      <span id="fecha-display"></span>
      <button onclick="cambiarFecha(1)">›</button>
      <button class="btn-hoy" onclick="irAHoy()" id="btn-today"></button>
    </div>
    <span class="reloj" id="reloj"></span>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label" id="lbl-citas"></div><div class="stat-value accent" id="st-total">-</div></div>
  <div class="stat"><div class="stat-label" id="lbl-comp"></div><div class="stat-value green" id="st-comp">-</div></div>
  <div class="stat"><div class="stat-label" id="lbl-cancel"></div><div class="stat-value red" id="st-cancel">-</div></div>
  <div class="stat"><div class="stat-label" id="lbl-noshow"></div><div class="stat-value amber" id="st-noshow">-</div></div>
  <div class="stat"><div class="stat-label" id="lbl-income"></div><div class="stat-value green" id="st-ingresos">-</div></div>
</div>

<div class="section">
  <div class="section-title"><div class="dot" style="background:var(--accent2)"></div> <span id="lbl-dayappts"></span></div>
  <div class="citas-grid" id="citas-list"></div>
</div>

<div class="footer">Powered by Nexlify Software & AI</div>

<script>
var NID = {{ negocio.id }};
var fechaActual = new Date();

// ── Theme ──
var theme = localStorage.getItem('nx_theme') || 'dark';
function applyTheme(){
  if(theme === 'light'){
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}
function toggleTheme(){
  theme = (theme === 'dark') ? 'light' : 'dark';
  localStorage.setItem('nx_theme', theme);
  applyTheme();
}
applyTheme();

// ── Language ──
var T = {
  es: {
    citas:'Citas', completed:'Completadas', cancelled:'Canceladas', noshow:'No-shows',
    income:'Ingresos', dayAppts:'Citas del día', today:'Hoy', navCitas:'Citas',
    empty:'Sin citas para este día', complete:'Completada', noshowBtn:'No show',
    cancel:'Cancelar', confirmCancel:'¿Cancelar esta cita? Se notificará al cliente.',
    confirmMark:'¿Marcar como ', langBtn:'EN',
    dias:['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'],
    meses:['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
  },
  en: {
    citas:'Appointments', completed:'Completed', cancelled:'Cancelled', noshow:'No-shows',
    income:'Revenue', dayAppts:"Today's appointments", today:'Today', navCitas:'Appointments',
    empty:'No appointments for this day', complete:'Complete', noshowBtn:'No show',
    cancel:'Cancel', confirmCancel:'Cancel this appointment? The client will be notified.',
    confirmMark:'Mark as ', langBtn:'ES',
    dias:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
    meses:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  }
};

var lang = localStorage.getItem('nx_lang') || 'es';

function toggleLang(){
  lang = (lang === 'es') ? 'en' : 'es';
  localStorage.setItem('nx_lang', lang);
  applyLang();
  cargar();
}

function applyLang(){
  var s = T[lang];
  document.getElementById('lang-btn').textContent = s.langBtn;
  document.getElementById('btn-today').textContent = s.today;
  document.getElementById('nav-citas').textContent = s.navCitas;
  document.getElementById('lbl-citas').textContent = s.citas;
  document.getElementById('lbl-comp').textContent = s.completed;
  document.getElementById('lbl-cancel').textContent = s.cancelled;
  document.getElementById('lbl-noshow').textContent = s.noshow;
  document.getElementById('lbl-income').textContent = s.income;
  document.getElementById('lbl-dayappts').textContent = s.dayAppts;
}
applyLang();

setInterval(function(){
  document.getElementById('reloj').textContent = new Date().toLocaleTimeString(lang==='es'?'es-MX':'en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

function fmt(d){ var s=T[lang]; return s.dias[d.getDay()]+' '+d.getDate()+' '+s.meses[d.getMonth()]+' '+d.getFullYear(); }
function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function cambiarFecha(delta){ fechaActual.setDate(fechaActual.getDate()+delta); cargar(); }
function irAHoy(){ fechaActual = new Date(); cargar(); }

function cargar(){
  var s = T[lang];
  document.getElementById('fecha-display').textContent = fmt(fechaActual);
  var f = iso(fechaActual);

  fetch('/api/citas/'+NID+'?fecha='+f).then(function(r){ return r.json(); }).then(function(citas){
    var el = document.getElementById('citas-list');
    if(!citas.length){ el.innerHTML = '<div class="vacio">'+s.empty+'</div>'; return; }
    var html = '';
    for(var i = 0; i < citas.length; i++){
      var c = citas[i];
      var acciones = '';
      if(c.estado === 'confirmada'){
        acciones = '<button class="btn-sm btn-completar" onclick="cambiarEstado('+c.id+',\'completada\')">'+s.complete+'</button>'
          + '<button class="btn-sm btn-noshow" onclick="cambiarEstado('+c.id+',\'no_show\')">'+s.noshowBtn+'</button>'
          + '<button class="btn-sm btn-cancelar" onclick="cambiarEstado('+c.id+',\'cancelada\')">'+s.cancel+'</button>';
      } else {
        acciones = '<span class="estado-badge estado-'+c.estado+'">'+c.estado.replace('_',' ')+'</span>';
      }
      html += '<div class="cita">'
        + '<div class="cita-hora"><div class="inicio">'+c.hora_inicio+'</div><div class="fin">'+c.hora_fin+'</div><div class="duracion">'+c.duracion_min+'min</div></div>'
        + '<div class="cita-info"><h4>'+c.nombre_cliente+'</h4><div class="servicio">'+c.servicio_nombre+'</div><div class="precio">$'+c.servicio_precio.toFixed(0)+'</div><div class="tel">'+c.telefono_cliente+'</div></div>'
        + '<div class="cita-actions">'+acciones+'</div>'
        + '</div>';
    }
    el.innerHTML = html;
  });

  fetch('/api/stats/'+NID+'?fecha='+f).then(function(r){ return r.json(); }).then(function(st){
    document.getElementById('st-total').textContent = st.hoy_total;
    document.getElementById('st-comp').textContent = st.completadas;
    document.getElementById('st-cancel').textContent = st.canceladas;
    document.getElementById('st-noshow').textContent = st.no_shows;
    document.getElementById('st-ingresos').textContent = '$'+st.ingresos.toFixed(0);
  });
}

function cambiarEstado(id, estado){
  var s = T[lang];
  var msg = (estado === 'cancelada') ? s.confirmCancel : s.confirmMark + estado.replace('_',' ') + '?';
  if(!confirm(msg)) return;
  fetch('/api/citas/'+id+'/estado', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({estado:estado})}).then(function(){ cargar(); });
}

cargar();
setInterval(cargar, 8000);
</script>
</body>
</html>
